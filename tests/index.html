<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TikTok Video Resizer — Property Tests</title>
  <style>
    body { font-family: monospace; padding: 2rem; background: #111; color: #eee; }
    h1 { color: #fff; margin-bottom: 1.5rem; }
    .result { padding: 0.5rem 0.75rem; margin: 0.4rem 0; border-radius: 4px; font-size: 0.9rem; }
    .pass { background: #1a3a1a; color: #4caf50; border-left: 4px solid #4caf50; }
    .fail { background: #3a1a1a; color: #f44336; border-left: 4px solid #f44336; }
    .error-detail { font-size: 0.8rem; margin-top: 0.3rem; color: #ff8a80; white-space: pre-wrap; word-break: break-word; }
    #summary { margin-top: 1.5rem; font-size: 1.1rem; font-weight: bold; padding: 0.75rem 1rem; border-radius: 4px; }
    .summary-pass { background: #1a3a1a; color: #4caf50; }
    .summary-fail { background: #3a1a1a; color: #f44336; }
    #loading { color: #aaa; }
  </style>
</head>
<body>
  <h1>Property-Based Tests</h1>
  <div id="loading">Loading…</div>
  <div id="results"></div>
  <div id="summary"></div>

  <!-- 1. Load app globals (computeCropRect, stripExtension, FileInputComponent, etc.) -->
  <script src="../app.js"></script>

  <script type="module">
    // 2. Load fast-check from CDN
    const fc = await import('https://cdn.jsdelivr.net/npm/fast-check/+esm');

    // 3. Import all registerPropertyN functions
    const {
      registerProperty1,
      registerProperty2,
      registerProperty3,
      registerProperty4,
      registerProperty5,
      registerProperty6,
      registerProperty7,
      registerProperty8,
      registerProperty9,
      registerProperty10,
      registerProperty11,
    } = await import('./properties.test.js');

    // 4. Build the list of properties to run
    const properties = [
      registerProperty1(fc, window.computeCropRect),
      registerProperty2(fc, window.computeCropRect),
      registerProperty3(fc),
      registerProperty4(fc),
      registerProperty5(fc),
      registerProperty6(fc),
      registerProperty7(fc, window.stripExtension),
      registerProperty8(fc, window.FileInputComponent),
      registerProperty9(fc, window.FileInputComponent),
      registerProperty10(fc),
      registerProperty11(fc),
    ];

    // 5. Run each property and display results
    document.getElementById('loading').remove();

    const resultsEl = document.getElementById('results');
    let passed = 0;

    for (const prop of properties) {
      const div = document.createElement('div');
      try {
        prop.run();
        passed++;
        div.className = 'result pass';
        div.textContent = '✓ ' + prop.name;
      } catch (err) {
        div.className = 'result fail';
        div.innerHTML =
          '✗ ' + prop.name +
          '<div class="error-detail">' + String(err) + '</div>';
      }
      resultsEl.appendChild(div);
    }

    // 6. Summary
    const total = properties.length;
    const summaryEl = document.getElementById('summary');
    summaryEl.textContent = passed + '/' + total + ' passed';
    summaryEl.className = 'summary-' + (passed === total ? 'pass' : 'fail');
  </script>
</body>
</html>
